    <style>

        .nav-item:hover, .nav-item.active { background: #1e2a36; color: white; border-left-color: #4caf50; }
        .content-right { flex: 1; padding: 30px 35px; background: #eef2f5; overflow-y: auto; }

        .quiz-question p { font-weight: 700; margin-bottom: 10px; font-size: 1.05rem; }

        @media (max-width: 800px) {

<script>
    // ========== РАЗВЁРНУТАЯ ТЕОРИЯ (с пояснениями и примерами) ==========
    const theoryData = {
        1: "База данных (БД) — это структурированная совокупность данных, хранимых на носителе и связанных между собой. Назначение БД — хранение и обеспечение эффективного доступа к данным. Предметная область — часть реального мира (например, университет, магазин), данные о которой хранятся в БД. Технология БД — совокупность методов и средств для создания, ведения и использования баз данных.",

        2: "Основные задачи БД: 1) Хранение информации — долговременное и надёжное сохранение данных. 2) Управление данными — добавление (INSERT), изменение (UPDATE), удаление (DELETE) данных. 3) Доступ к данным — быстрый поиск и выборка нужной информации. 4) Анализ данных — агрегация, построение отчётов, статистическая обработка. 5) Управление связями — поддержание целостности ссылок между связанными таблицами с помощью внешних ключей.",

        3: "Структура БД включает три основных компонента: Таблицы — основные объекты, в которых построчно хранятся данные (каждая таблица состоит из столбцов-атрибутов и строк-записей). Индексы — специальные структуры, ускоряющие поиск и сортировку данных (аналогичны алфавитному указателю в книге). Представления — виртуальные таблицы, которые не хранят данные самостоятельно, а являются сохранёнными SQL-запросами, упрощающими доступ к данным.",

        4: "Виды баз данных: • Реляционные (RDBMS) — данные организованы в виде связанных таблиц (MySQL, PostgreSQL, Oracle). • Нереляционные (NoSQL) — включают документоориентированные (MongoDB), типа «ключ-значение» (Redis), графовые (Neo4j). • Объектно-ориентированные — данные и методы объединены в объекты (ObjectDB). • Временные — хранят историю изменений с метками времени. • Многомодельные — сочетают несколько подходов (например, ArangoDB).",

        5: "Принципы организации БД: Целостность — обеспечение точности и непротиворечивости данных (ограничения, внешние ключи). Независимость данных — изменение структуры БД не должно требовать изменения прикладных программ. Нормализация — процесс устранения избыточности и дублирования данных путём разбиения таблиц. Связи между таблицами: 1:1 (один к одному), 1:M (один ко многим), M:N (многие ко многим, реализуется через связующую таблицу).",

        6: "Предметная область — это фрагмент реального мира (например, «университет», «интернет-магазин», «авиакассы»), данные о котором подлежат хранению в БД. Анализ предметной области — это процесс выявления: сущностей (объектов, о которых нужно хранить данные, например «Студент», «Курс»); атрибутов (свойств сущностей, например ФИО, дата рождения); связей между сущностями (например, студент обучается на курсе); бизнес-ограничений (например, возраст студента не может быть отрицательным).",

        7: "Инфологическое (концептуальное) проектирование — этап создания модели предметной области, не зависящей от конкретной СУБД. Цель: построить полное и непротиворечивое описание предметной области. Задачи: выделить сущности, определить их атрибуты и связи. Этапы: сбор требований → выделение сущностей → определение связей → построение ER-диаграммы. Результат: инфологическая модель (ER-диаграмма).",

        8: "Логическое проектирование — преобразование инфологической модели в структуру, понятную конкретной СУБД (обычно реляционной). Цель: получить логическую схему БД в терминах выбранной модели данных. Результат: набор таблиц с определёнными столбцами, первичными ключами (уникальными идентификаторами), внешними ключами (ссылками на другие таблицы), нормализованными отношениями.",

        9: "Физическое проектирование — этап, на котором решается, как логическая структура будет физически храниться на диске. Цель: оптимизировать производительность БД (скорость выполнения запросов). Результат: физическая схема БД, включающая: размещение файлов данных на диске; создание индексов для ускорения поиска; параметры хранения (размер блока, сжатие); распределение данных по дискам (шардинг).",

        10: "ER-диаграмма (Entity-Relationship) — графический язык для описания инфологической модели. Сущность (обозначается прямоугольником □) — это объект предметной области (например, «Студент»). Атрибут (обозначается овалом ○) — свойство сущности (например, «ФИО», «Дата рождения»). Ключевые атрибуты подчёркиваются. Связь (обозначается ромбом ◊) — отношение между сущностями. Типы связей: 1:1 (один к одному) — один экземпляр сущности A связан с одним экземпляром B; 1:N (один ко многим) — один экземпляр A связан с несколькими B; M:N (многие ко многим) — несколько A связаны с несколькими B (требует дополнительной таблицы).",

        11: "Первая нормальная форма (1НФ): отношение находится в 1НФ, если все его атрибуты атомарны (неделимы) и отсутствуют повторяющиеся группы. Требования: каждая ячейка содержит одно значение; нет массивов или вложенных таблиц. Пример нарушения: столбец «Телефоны» со значением «123,456,789». Исправление: создать отдельные строки для каждого телефона или отдельную таблицу.",

        12: "Вторая нормальная форма (2НФ): отношение находится в 2НФ, если оно находится в 1НФ и все неключевые атрибуты полностью зависят от всего первичного ключа (отсутствует частичная зависимость). Пример нарушения: отношение (Заказ№, Товар, Цена) с составным ключом (Заказ№, Товар). Атрибут «Цена» зависит только от «Товара», а не от всего ключа. Исправление: разделить на (Заказ№, Товар) и (Товар, Цена).",

        13: "Третья нормальная форма (3НФ): отношение находится в 3НФ, если оно находится в 2НФ и отсутствуют транзитивные зависимости (неключевой атрибут не зависит от другого неключевого атрибута). Пример нарушения: (ID_студента, Группа, Факультет). Факультет зависит от Группы, а не напрямую от ID_студента. Исправление: разделить на (ID_студента, Группа) и (Группа, Факультет).",

        14: "Сетевая модель данных — модель, в которой данные представлены в виде графа: записи — это узлы, а связи между ними — дуги. Основные понятия: записи (узлы) и наборы (связи). Допускает связи «многие ко многим» напрямую (без дополнительных таблиц). Графическое изображение: вершины графа (записи), рёбра (связи). Пример: один студент может обучаться на нескольких курсах, и на каждом курсе много студентов. В отличие от иерархической модели, у записи может быть несколько родителей.",

        15: "Реляционная модель данных — основная модель современных СУБД. Основные понятия: Отношение (таблица) — множество строк одинаковой структуры. Кортеж (строка) — одна запись в таблице. Атрибут (столбец) — свойство объекта. Первичный ключ — уникальный идентификатор строки (не может быть NULL). Внешний ключ — ссылка на первичный ключ другой таблицы, обеспечивает целостность связей. Графически изображается в виде таблицы с заголовками столбцов. Пример: таблица Student(StudID (PK), Name, GroupID (FK ссылается на Groups)).",

        16: "Объектно-ориентированная модель данных — модель, объединяющая данные и методы их обработки. Основные понятия: Объект — экземпляр класса, имеет состояние (данные) и поведение (методы). Класс — шаблон для создания объектов. Наследование — один класс может расширять функциональность другого. Инкапсуляция — сокрытие внутренних деталей реализации. Графически изображается с помощью UML-диаграмм классов. Пример: класс «Сотрудник» с полями (имя, оклад, должность) и методом «РассчитатьБонус()»; класс «Менеджер» наследует «Сотрудник» и добавляет поле «Отдел».",

        17: "СУБД (Система Управления Базами Данных) — комплекс программ для создания, ведения и совместного использования БД. Архитектуры: Однозвенная (файл-серверная) — БД хранится на сервере как файлы, приложение работает на клиенте и обращается к файлам напрямую (Microsoft Access). Двухзвенная (клиент-серверная) — клиентское приложение подключается к серверу БД по сети, сервер обрабатывает запросы и возвращает результат (MySQL, PostgreSQL). Трёхзвенная — клиент взаимодействует с сервером приложений (бизнес-логика), который уже обращается к серверу БД (веб-приложения).",

        18: "SQL (Structured Query Language) — структурированный язык запросов к базам данных. DDL (Data Definition Language) — язык определения данных: CREATE — создание таблиц, индексов, представлений; ALTER — изменение структуры существующих объектов; DROP — удаление объектов. DML (Data Manipulation Language) — язык манипуляции данными: SELECT — выборка данных; INSERT — вставка новых строк; UPDATE — обновление существующих строк; DELETE — удаление строк.",

        19: "DCL (Data Control Language) — язык управления доступом к данным: GRANT — предоставление прав пользователю (например, право на SELECT, INSERT); REVOKE — отзыв прав. TCL (Transaction Control Language) — язык управления транзакциями: COMMIT — фиксация всех изменений в текущей транзакции; ROLLBACK — откат всех изменений с момента последнего COMMIT; SAVEPOINT — установка промежуточной точки сохранения для частичного отката.",

        20: "Тип данных — это правило, определяющее, какие значения может принимать столбец. CHAR(n) — строка фиксированной длины n; если вставлено меньше символов, дополняется пробелами справа. VARCHAR(n) — строка переменной длины, не более n символов; экономит место, так как хранит ровно столько, сколько введено. TEXT — тип для хранения длинных текстов (до нескольких гигабайт, зависит от СУБД).",

        21: "DATE — хранит только дату (год-месяц-день), например '2025-06-14'. TIME — хранит только время (часы:минуты:секунды), например '14:30:00'. DATETIME или TIMESTAMP — хранит дату и время вместе, например '2025-06-14 14:30:00'. BOOLEAN — логический тип, может принимать значения TRUE (истина) или FALSE (ложь).",

        22: "DECIMAL(p,s) или NUMERIC(p,s) — точный числовой тип для хранения денежных сумм и других величин, где важна точность. p — общее количество цифр, s — количество цифр после запятой. Пример: DECIMAL(10,2) может хранить 12345678.90. FLOAT — приближённое число с плавающей точкой одинарной точности (4 байта), хранит с ошибкой округления. DOUBLE — двойной точности (8 байт), более точный, чем FLOAT.",

        23: "CREATE TABLE — создание новой таблицы. Пример: <code>CREATE TABLE Users ( id INT PRIMARY KEY AUTOINCREMENT, name VARCHAR(50) NOT NULL UNIQUE, age INT CHECK(age >= 0) );</code> PRIMARY KEY — первичный ключ; AUTOINCREMENT — автоматическое увеличение значения; NOT NULL — поле не может быть пустым; UNIQUE — все значения уникальны. DROP TABLE Users; — полностью удаляет таблицу со всеми данными.",

        24: "Индекс — специальная структура данных (часто B-дерево), которая ускоряет операции поиска, сортировки и группировки. Индексное поле — столбец, для которого построен индекс. Создание индекса: <code>CREATE INDEX idx_name ON Users(name);</code> Удаление индекса: <code>DROP INDEX idx_name;</code> Важно: индексы замедляют вставку и обновление данных, поэтому их создают только для часто используемых в WHERE, ORDER BY, JOIN столбцов.",

        25: "Структура таблицы — это набор столбцов, их типов данных и ограничений. ALTER TABLE — команда для изменения структуры. Что можно изменить: добавить столбец (<code>ALTER TABLE Users ADD birth_date DATE;</code>); удалить столбец (<code>ALTER TABLE Users DROP COLUMN birth_date;</code>); изменить тип столбца (<code>ALTER TABLE Users MODIFY name VARCHAR(100);</code>); добавить ограничение (<code>ALTER TABLE Users ADD CONSTRAINT chk_age CHECK(age>=0);</code>).",

        26: "Запись данных (вставка) — добавление новой строки в таблицу. Команда INSERT: <code>INSERT INTO Users (id, name, age) VALUES (1, 'Иван Петров', 20);</code> Можно вставить несколько строк за раз: <code>INSERT INTO Users (name, age) VALUES ('Мария', 19), ('Петр', 21);</code>",

        27: "Выборка данных — извлечение данных из таблицы. Оператор SELECT: <code>SELECT * FROM Users;</code> — все столбцы. <code>SELECT name, age FROM Users;</code> — только указанные столбцы. <code>SELECT name FROM Users WHERE age > 18;</code> — с фильтрацией. <code>SELECT name FROM Users ORDER BY age DESC;</code> — с сортировкой.",

        28: "WHERE — фильтрация строк по условию. ORDER BY — сортировка результата: ASC (по возрастанию, по умолчанию) и DESC (по убыванию). COUNT(*) — агрегатная функция, возвращающая количество строк. Пример: <code>SELECT COUNT(*) FROM Users WHERE age > 18 ORDER BY name ASC;</code> — подсчёт пользователей старше 18 лет, результат отсортирован по имени (хотя COUNT возвращает одно число).",

        29: "IN — проверяет, входит ли значение в список: <code>WHERE city IN ('Москва', 'СПб', 'Казань')</code>. BETWEEN — проверяет нахождение в диапазоне (включительно): <code>WHERE age BETWEEN 18 AND 25</code>. LIKE — поиск по шаблону: % — любая последовательность символов, _ — один символ. Пример: <code>WHERE name LIKE 'А%'</code> — имена на букву А. IS NULL — проверка на пустое значение (NULL — это не 0 и не пустая строка): <code>WHERE phone IS NULL</code>.",

        30: "Числовые константы: 5, 3.14, -100. Символьные (строковые) константы: 'hello', 'Иван', '123' (как строка). Арифметические операции: + (сложение), - (вычитание), * (умножение), / (деление). Пример: <code>SELECT price * 1.2 AS price_with_vat FROM Products;</code> Конкатенация строк (объединение): в стандарте SQL — оператор ||: <code>SELECT first_name || ' ' || last_name AS full_name FROM Users;</code> В MySQL используется функция CONCAT().",

        31: "LOWER(строка) — преобразует все символы в нижний регистр: <code>LOWER('Hello World') → 'hello world'</code>. UPPER(строка) — в верхний регистр: <code>UPPER('Hello') → 'HELLO'</code>. INITCAP(строка) — делает первую букву каждого слова заглавной, остальные строчными (поддерживается в Oracle и PostgreSQL, в других СУБД нет): <code>INITCAP('hello world') → 'Hello World'</code>.",

        32: "SUBSTR(строка, позиция, длина) — извлекает подстроку (позиция с 1): <code>SUBSTR('abcdef', 2, 3) → 'bcd'</code>. INSTR(строка, подстрока) — возвращает позицию первого вхождения подстроки (0 — если не найдена): <code>INSTR('abcdef', 'cd') → 3</code>. LENGTH(строка) — возвращает длину строки в символах: <code>LENGTH('hello') → 5</code>.",

        33: "ABS(число) — абсолютное значение (модуль): <code>ABS(-5) → 5</code>. FLOOR(число) — округление вниз до целого: <code>FLOOR(3.9) → 3</code>. CEIL(число) — округление вверх до целого: <code>CEIL(3.1) → 4</code>. ROUND(число, точность) — округление до указанного количества знаков: <code>ROUND(3.14159, 2) → 3.14</code>. TRUNC(число, точность) — отсечение дробной части (не округляет): <code>TRUNC(3.99) → 3</code>.",

        34: "COS(x), SIN(x), TAN(x) — тригонометрические функции (аргумент в радианах). EXP(x) — e в степени x (экспонента): <code>EXP(1) → 2.71828</code>. LOG(x) — натуральный логарифм (ln x): <code>LOG(2.71828) → 1</code>. POWER(x, y) — x в степени y: <code>POWER(2, 3) → 8</code>. SQRT(x) — квадратный корень: <code>SQRT(25) → 5</code>.",

        35: "Агрегатные функции: COUNT(столбец) — количество ненулевых значений; COUNT(*) — количество строк; SUM(столбец) — сумма; AVG(столбец) — среднее арифметическое; MAX(столбец) — максимальное; MIN(столбец) — минимальное. GROUP BY — группирует строки с одинаковыми значениями, после чего агрегатные функции применяются к каждой группе. Пример: <code>SELECT city, AVG(age) FROM Users GROUP BY city;</code> — средний возраст по городам.",

        36: "Вложенный подзапрос — это SELECT, находящийся внутри другого запроса. Связанный (коррелированный) подзапрос — подзапрос, который ссылается на столбцы из внешнего запроса и выполняется для каждой строки внешнего запроса. Пример: <code>SELECT name FROM Users u WHERE age > (SELECT AVG(age) FROM Users WHERE city = u.city);</code> — выбрать пользователей, чей возраст выше среднего по их городу. Без связывания подзапрос выполнился бы один раз для всего города, а не для каждого.",

        37: "Связанный подзапрос формируется: помещается в WHERE, HAVING или SELECT внешнего запроса; содержит ссылку на столбец внешнего запроса (обычно через алиас). Пример: выбор товаров, цена которых выше средней цены товаров в той же категории: <code>SELECT * FROM Products p WHERE price > (SELECT AVG(price) FROM Products WHERE category = p.category);</code> Алиас p во внешнем запросе позволяет подзапросу обращаться к текущей категории.",

                     </div>`;
        }
        html += `</div></div><footer>Тувинский государственный университет | Фундаментальная информатика и ИТ, 4 семестр</footer>`;
        document.getElementById('content-right').innerHTML = html;
    }

    // ========== ОТРИСОВКА СПИСКА ВОПРОСОВ ==========
    function renderQuestions() {
        let html = `<h1>📋 Список экзаменационных вопросов</h1>
                    <div class="questions-card">
                        <p style="margin-bottom: 20px; color: #555; font-style: italic;">Вопросы из экзаменационного билета (в исходном виде)</p>
                        <div class="questions-list">`;
        for (let i = 0; i < originalQuestions.length; i++) {
            html += `<div class="question-item">
                        <span class="question-number">${i+1}.</span>
                        <span class="question-text">${originalQuestions[i]}</span>
                     </div>`;
        }
        html += `</div></div><footer>Тувинский государственный университет | Фундаментальная информатика и ИТ, 4 семестр</footer>`;
        document.getElementById('content-right').innerHTML = html;
    }

    // ========== ОТРИСОВКА ТЕСТА ==========
    function renderQuiz() {
        let formHtml = `<h1>📝 Экзаменационный тест (38 вопросов)</h1>
                        <div class="quiz-block">
                            <h3>Выберите правильный ответ на каждый вопрос. После завершения увидите список ошибок.</h3>
                            <div id="test-container"></div>
                            <button id="submit-test" class="quiz-btn" style="margin-top:20px">✅ Завершить тест</button>
                        </div>
                        <div id="result-area"></div>
                        <footer>Тувинский государственный университет | Фундаментальная информатика и ИТ</footer>`;
        document.getElementById('content-right').innerHTML = formHtml;
        
        const container = document.getElementById('test-container');
        let questionsHtml = '';
        testQuestions.forEach((q, idx) => {
            questionsHtml += `<div class="quiz-question">
                                <p>${idx+1}. ${q.text}</p>`;
            q.options.forEach((opt, optIdx) => {
                questionsHtml += `<label>
                                    <input type="radio" name="q${idx}" value="${optIdx}">
                                    ${opt}
                                  </label>`;
            });
            questionsHtml += `</div>`;
        });
        container.innerHTML = questionsHtml;

        document.getElementById('submit-test').addEventListener('click', () => {
            let score = 0;
            const errors = [];
            for (let i = 0; i < testQuestions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const selectedIdx = selected ? parseInt(selected.value) : -1;
                const q = testQuestions[i];
                if (selectedIdx === q.correct) {
                    score++;
                } else {
                    const selectedText = (selectedIdx === -1) ? "❌ Не выбран" : q.options[selectedIdx];
                    errors.push({
                        number: i+1,
                        questionText: q.text,
                        selected: selectedText,
                        correct: q.options[q.correct]
                    });
                }
            }
            const percent = Math.round((score / testQuestions.length) * 100);
            let resultHtml = `<div class="result-block">
                                <h3>📊 Результат: ${score} из ${testQuestions.length} (${percent}%)</h3>`;
            if (errors.length === 0) {
                resultHtml += `<p style="color:green; font-weight:bold;">🎉 Превосходно! Все ответы верны.</p>`;
            } else {
                resultHtml += `<p style="color:#c0392b;">❌ Ошибки в следующих вопросах (${errors.length}):</p>`;
                errors.forEach(err => {
                    resultHtml += `<div class="error-item">
                                    <strong>Вопрос №${err.number}:</strong> ${err.questionText}<br>
                                    <span style="color:#e74c3c;">✗ Ваш ответ: ${err.selected}</span><br>
                                    <span style="color:#27ae60;">✓ Правильный ответ: ${err.correct}</span>
                                   </div>`;
                });
            }
            resultHtml += `</div>`;
            document.getElementById('result-area').innerHTML = resultHtml;
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    // ========== НАВИГАЦИЯ ==========
    function navigate(page) {
        if (page === 'theory') {
            renderTheory();
        } else if (page === 'questions') {
            renderQuestions();
        } else if (page === 'quiz') {
            renderQuiz();
        }
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.page === page);
        });
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => navigate(item.dataset.page));
    });
    navigate('theory');
</script>
</body>
</html>
