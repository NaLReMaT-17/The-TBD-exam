    const theoryData = {
        1: "БД — структурированная совокупность данных, хранимых на носителе и связанных между собой. Назначение: хранение и эффективный доступ. Предметная область — часть реального мира. Технология БД — методы создания и ведения БД.",
        2: "Хранение информации, управление данными (добавление/изменение/удаление), доступ (быстрый поиск), анализ данных (агрегация, отчёты), управление связями (целостность ссылок).",
        3: "Таблицы (основные объекты), индексы (ускоряют поиск), представления (виртуальные таблицы на основе запросов).",
        4: "Реляционные (RDBMS: MySQL, PostgreSQL) — данные в виде связанных таблиц; нереляционные (NoSQL: документоориентированные MongoDB, ключ-значение Redis, графовые Neo4j); объектно-ориентированные (данные+методы); временные (исторические с метками времени); многомодельные (сочетают несколько подходов).",
        5: "Целостность (точность данных), независимость данных (изменение структуры не ломает приложения), нормализация (устранение избыточности), связи между таблицами (1:1, 1:M, M:N).",
        6: "Предметная область — фрагмент реальности (университет, магазин, авиакассы). Анализ: выявление сущностей (объектов), их атрибутов (свойств), связей между сущностями и бизнес-ограничений для последующего проектирования БД.",
        7: "Цель: создать независимую от СУБД модель предметной области. Задачи: описать сущности, атрибуты, связи. Этапы: сбор требований → выделение сущностей → определение связей → построение ER-диаграммы. Результат: инфологическая (концептуальная) модель.",
        8: "Цель: преобразовать инфологическую модель в структуру, понимаемую конкретной СУБД (обычно реляционную). Результат: логическая схема БД (набор таблиц, первичные и внешние ключи, нормализованные отношения).",
        9: "Цель: оптимизация производительности — как данные физически будут храниться на диске, какие индексы создать, как распределить по файлам. Результат: физическая схема БД (файлы данных, индексы, параметры хранения).",
        10: "Сущность (прямоугольник) — объект предметной области (например, Студент). Атрибут (овал) — свойство сущности (ФИО, дата рождения). Ключевые атрибуты подчёркиваются. Связь (ромб) — отношения между сущностями: 1:1 (один к одному), 1:N (один ко многим), M:N (многие ко многим).",
        11: "Первая нормальная форма (1НФ): все атрибуты атомарны (неделимы) — нет множеств или составных значений. Требования: нет повторяющихся групп, каждая ячейка содержит одно значение. Пример: вместо телефона '123,456' нужно создать две отдельные записи.",
        12: "Вторая нормальная форма (2НФ): отношение находится в 1НФ, и все неключевые атрибуты полностью зависят от всего первичного ключа (отсутствует частичная зависимость). Пример: в отношении (Заказ№, Товар, Цена) цена зависит только от товара — требуется декомпозиция.",
        13: "Третья нормальная форма (3НФ): отношение находится в 2НФ, и отсутствуют транзитивные зависимости (неключевой атрибут не зависит от другого неключевого атрибута). Пример: (ID_студента, Группа, Факультет) — факультет зависит от группы, нужно вынести группы в отдельную таблицу.",
        14: "Сетевая модель данных: данные представлены в виде графа, где записи — это узлы, а связи — дуги. Допускает связи «многие ко многим». Графически изображается как граф с вершинами (записи) и рёбрами (связи). Пример: один студент может обучаться на нескольких курсах, и на каждом курсе много студентов.",
        15: "Реляционная модель данных: основные понятия — отношение (таблица), кортеж (строка), атрибут (столбец), первичный ключ (уникальный идентификатор строки), внешний ключ (ссылка на первичный ключ другой таблицы). Графически изображается в виде таблицы с заголовками столбцов. Пример: таблица Student(StudID, Name, GroupID).",
        16: "Объектно-ориентированная модель данных: данные и методы их обработки объединены в объекты. Основные понятия: объект, класс (шаблон объекта), наследование (один класс может расширять другой), инкапсуляция (скрытие внутренних деталей), методы (функции, работающие с данными объекта). Графически изображается с помощью UML-диаграмм классов. Пример: класс «Сотрудник» содержит поля (имя, оклад) и метод «РассчитатьБонус()».",
        17: "СУБД (Система Управления Базами Данных) — комплекс программ для создания, ведения и совместного использования БД. Архитектуры: однозвенная (файл-серверная — БД на сервере, приложение на клиенте, например Microsoft Access); двухзвенная (клиент-серверная — клиент подключается напрямую к серверу БД); трёхзвенная (клиент → сервер приложений (бизнес-логика) → сервер БД).",
        18: "SQL (Structured Query Language) — структурированный язык запросов к базам данных. DDL (Data Definition Language) — язык определения данных: CREATE (создание объектов), ALTER (изменение структуры), DROP (удаление объектов). DML (Data Manipulation Language) — язык манипуляции данными: SELECT (выборка), INSERT (вставка), UPDATE (обновление), DELETE (удаление).",
        19: "DCL (Data Control Language) — язык управления доступом к данным: GRANT (предоставление прав), REVOKE (отзыв прав). TCL (Transaction Control Language) — язык управления транзакциями: COMMIT (подтверждение изменений), ROLLBACK (откат изменений), SAVEPOINT (установка точки сохранения внутри транзакции).",
        20: "CHAR(n) — символьный тип данных фиксированной длины n, дополняется пробелами справа. VARCHAR(n) — символьный тип данных переменной длины, не более n символов (экономит место). TEXT — тип для хранения длинных текстовых строк (отличается реализацией в разных СУБД).",
        21: "DATE — тип для хранения даты (год-месяц-день). TIME — тип для хранения времени (часы:минуты:секунды). DATETIME (или TIMESTAMP) — тип для хранения даты и времени вместе. BOOLEAN — логический тип, может принимать значения TRUE (истина) или FALSE (ложь).",
        22: "DECIMAL(p,s) или NUMERIC(p,s) — точный числовой тип: p — общее количество цифр, s — количество цифр после десятичной запятой (например, DECIMAL(10,2) для денежных сумм). FLOAT — приближённое число с плавающей точкой одинарной точности (4 байта). DOUBLE — приближённое число двойной точности (8 байт).",
        23: "CREATE TABLE имя_таблицы (имя_поля тип_данных [ограничения], ...); — создание новой таблицы. DROP TABLE имя_таблицы; — удаление таблицы со всеми данными. Пример: CREATE TABLE Users (id INT PRIMARY KEY AUTOINCREMENT, name VARCHAR(50) NOT NULL UNIQUE, age INT);",
        24: "Индекс — специальная структура данных, ускоряющая поиск и сортировку строк в таблице. Создание индекса: CREATE INDEX имя_индекса ON таблица(столбец);. Удаление индекса: DROP INDEX имя_индекса;. Индексы замедляют операции INSERT/UPDATE/DELETE, но ускоряют SELECT.",
        25: "ALTER TABLE — команда для изменения структуры существующей таблицы (добавление, удаление, изменение столбцов, добавление/удаление ограничений). Примеры: ALTER TABLE Users ADD age INT; — добавить столбец; ALTER TABLE Users DROP COLUMN age; — удалить столбец; ALTER TABLE Users MODIFY name VARCHAR(100); — изменить тип столбца.",
        26: "INSERT INTO таблица (столбец1, столбец2, ...) VALUES (значение1, значение2, ...); — добавление новой строки в таблицу. Пример: INSERT INTO Users (id, name) VALUES (1, 'Иван');",
        27: "SELECT — оператор выборки данных из таблиц. SELECT * FROM таблица; — выборка всех столбцов. SELECT столбец1, столбец2 FROM таблица WHERE условие; — выборка определённых столбцов с фильтрацией.",
        28: "WHERE — фильтрация строк по условию. ORDER BY — сортировка результата (ASC — по возрастанию, DESC — по убыванию). COUNT() — агрегатная функция, возвращающая количество строк. Пример: SELECT COUNT(*) FROM Users WHERE age > 18 ORDER BY name ASC; — подсчёт пользователей старше 18 лет, отсортированных по имени.",
        29: "IN — проверка вхождения значения в список: WHERE city IN ('Москва', 'СПб'). BETWEEN — проверка нахождения в диапазоне: WHERE age BETWEEN 18 AND 25. LIKE — поиск по шаблону: WHERE name LIKE 'А%' (имена на букву А). IS NULL — проверка на пустое значение: WHERE phone IS NULL.",
        30: "Числовые константы: 5, 3.14, -100. Символьные (строковые) константы: 'hello', 'Иван'. Арифметические операции: + (сложение), - (вычитание), * (умножение), / (деление). Конкатенация строк (объединение): в стандарте SQL — оператор ||, во многих СУБД также функция CONCAT(). Пример: 'a' || 'b' → 'ab'.",
        31: "Функции преобразования регистра: LOWER(строка) — переводит все символы в нижний регистр ('Hello' → 'hello'); UPPER(строка) — в верхний регистр ('Hello' → 'HELLO'); INITCAP(строка) — делает первую букву каждого слова заглавной, остальные строчными (поддерживается не во всех СУБД, например в Oracle и PostgreSQL).",
        32: "Функции для работы со строками: SUBSTR(строка, позиция, длина) — извлекает подстроку (позиция с 1); INSTR(строка, подстрока) — возвращает позицию первого вхождения подстроки (0 — если не найдена); LENGTH(строка) — возвращает длину строки в символах.",
        33: "Числовые функции: ABS(число) — абсолютное значение (модуль); FLOOR(число) — округление вниз до целого; CEIL(число) — округление вверх до целого; ROUND(число, [точность]) — округление до указанного количества знаков; TRUNC(число, [точность]) — отсечение дробной части (не округляет).",
        34: "Математические функции (в различных СУБД): COS(x), SIN(x), TAN(x) — тригонометрические (аргумент в радианах); EXP(x) — e в степени x; LOG(x) — натуральный логарифм (ln); POWER(x, y) — x в степени y (то же что x^y); SQRT(x) — квадратный корень из x.",
        35: "Агрегатные функции: COUNT(столбец) — количество ненулевых значений; COUNT(*) — количество строк; SUM(столбец) — сумма значений; AVG(столбец) — среднее арифметическое; MAX(столбец) — максимальное значение; MIN(столбец) — минимальное значение. GROUP BY — группирует строки с одинаковыми значениями в указанных столбцах, после чего применяются агрегатные функции к каждой группе. Пример: SELECT city, AVG(age) FROM Users GROUP BY city; — средний возраст по городам.",
        36: "Вложенный подзапрос — это запрос SELECT, находящийся внутри другого запроса SELECT, INSERT, UPDATE или DELETE. Связанный (коррелированный) подзапрос — подзапрос, который ссылается на столбцы из внешнего запроса (выполняется для каждой строки внешнего запроса). Пример: SELECT name FROM Users u WHERE age > (SELECT AVG(age) FROM Users WHERE city = u.city); — выбрать пользователей, возраст которых выше среднего по их городу.",
        37: "Связанный подзапрос формируется следующим образом: он размещается в условиях WHERE, HAVING или в списке SELECT внешнего запроса и содержит ссылку на столбец (алиас) из внешнего запроса. Пример: выбрать товары, цена которых выше средней цены товаров в той же категории: SELECT * FROM Products p WHERE price > (SELECT AVG(price) FROM Products WHERE category = p.category);",
        38: "Команды манипулирования данными (DML): INSERT — добавление новых строк; UPDATE — изменение существующих строк; DELETE — удаление строк. Примеры: INSERT INTO Users (id, name) VALUES (2, 'Петр'); UPDATE Users SET name = 'Петя' WHERE id = 2; DELETE FROM Users WHERE id = 2;"
    };

    // ========== ОТРИСОВКА ТЕОРИИ ==========
    function renderTheory() {
        let html = `<h1>📚 Теория по курсу «Технологии баз данных»</h1>
                    <div class="theory-card"><div class="theory-list">`;
        for (let i = 1; i <= 38; i++) {
            html += `<div class="theory-item">
                        <div class="theory-question">${i}. ${testQuestions[i-1].text}</div>
                        <div class="theory-answer">${theoryData[i]}</div>
                     </div>`;
        }
        html += `</div></div><footer>Тувинский государственный университет | Фундаментальная информатика и ИТ, 4 семестр</footer>`;
        document.getElementById('content-right').innerHTML = html;
    }

    // ========== ОТРИСОВКА ТЕСТА ==========
    function renderQuiz() {
        let formHtml = `<h1>📝 Экзаменационный тест (38 вопросов)</h1>
                        <div class="quiz-block">
                            <h3>Выберите правильный ответ на каждый вопрос. После завершения увидите список ошибок.</h3>
                            <div id="test-container"></div>
                            <button id="submit-test" class="quiz-btn" style="margin-top:20px">✅ Завершить тест</button>
                        </div>
                        <div id="result-area"></div>
                        <footer>Тувинский государственный университет | Фундаментальная информатика и ИТ</footer>`;
        document.getElementById('content-right').innerHTML = formHtml;
        
        const container = document.getElementById('test-container');
        let questionsHtml = '';
        testQuestions.forEach((q, idx) => {
            questionsHtml += `<div class="quiz-question">
                                <p>${idx+1}. ${q.text}</p>`;
            q.options.forEach((opt, optIdx) => {
                questionsHtml += `<label>
                                    <input type="radio" name="q${idx}" value="${optIdx}">
                                    ${opt}
                                  </label>`;
            });
            questionsHtml += `</div>`;
        });
        container.innerHTML = questionsHtml;

        document.getElementById('submit-test').addEventListener('click', () => {
            let score = 0;
            const errors = [];
            for (let i = 0; i < testQuestions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const selectedIdx = selected ? parseInt(selected.value) : -1;
                const q = testQuestions[i];
                if (selectedIdx === q.correct) {
                    score++;
                } else {
                    const selectedText = (selectedIdx === -1) ? "❌ Не выбран" : q.options[selectedIdx];
                    errors.push({
                        number: i+1,
                        questionText: q.text,
                        selected: selectedText,
                        correct: q.options[q.correct]
                    });
                }
            }
            const percent = Math.round((score / testQuestions.length) * 100);
            let resultHtml = `<div class="result-block">
                                <h3>📊 Результат: ${score} из ${testQuestions.length} (${percent}%)</h3>`;
            if (errors.length === 0) {
                resultHtml += `<p style="color:green; font-weight:bold;">🎉 Превосходно! Все ответы верны. Вы отлично подготовились!</p>`;
            } else {
                resultHtml += `<p style="color:#c0392b;">❌ Ошибки в следующих вопросах (${errors.length}):</p>`;
                errors.forEach(err => {
                    resultHtml += `<div class="error-item">
                                    <strong>Вопрос №${err.number}:</strong> ${err.questionText}<br>
                                    <span style="color:#e74c3c;">✗ Ваш ответ: ${err.selected}</span><br>
                                    <span style="color:#27ae60;">✓ Правильный ответ: ${err.correct}</span>
                                   </div>`;
                });
            }
            resultHtml += `</div>`;
            document.getElementById('result-area').innerHTML = resultHtml;
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    // ========== НАВИГАЦИЯ ==========
    function navigate(page) {
        if (page === 'theory') {
            renderTheory();
        } else if (page === 'quiz') {
            renderQuiz();
        }
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.page === page);
        });
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => navigate(item.dataset.page));
    });
    navigate('theory');
</script>
